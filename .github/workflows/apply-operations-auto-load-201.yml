name: Apply Operations Auto Load 2.0.1

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/apply-operations-auto-load-201.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Apply verified source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          gradle=Path('operations-android/app/build.gradle.kts'); g=gradle.read_text().replace('versionCode = 1','versionCode = 4').replace('versionName = "1.0.0"','versionName = "2.0.1"'); gradle.write_text(g)
          path=Path('operations-android/app/src/main/assets/www/app-v2.6.12.js'); text=path.read_text()
          capacity="""function loadTypeCapacity(itemType = state.draft.itemType) {
            const type = loadTypes[itemType] || loadTypes.assorted_clothes;
            return Math.max(type.unit === 'pc' ? 1 : 0.5, Number(state.settings[type.capacityKey] ?? type.capacity) || type.capacity);
          }
          """
          helper="""function quantityText(value, unit = 'kg') {
            const number = unit === 'pc' ? Math.round(Number(value) || 0) : Math.round((Number(value) || 0) * 10) / 10;
            return `${Number.isInteger(number) ? number : number.toFixed(1)} ${unit}`;
          }
          function loadDistribution(total, capacity, unit = 'kg') {
            const parts = [];
            let remaining = unit === 'pc' ? Math.round(Number(total) || 0) : Math.round((Number(total) || 0) * 10) / 10;
            while (remaining > 0 && parts.length < 15) {
              const part = unit === 'pc' ? Math.round(Math.min(capacity, remaining)) : Math.round(Math.min(capacity, remaining) * 10) / 10;
              parts.push(part);
              remaining = unit === 'pc' ? Math.round(remaining - part) : Math.round((remaining - part) * 10) / 10;
            }
            return parts;
          }
          function renderAutoLoadNotice(calc = calculateDraft()) {
            let notice = $('#posAutoLoadNotice');
            if (!notice) {
              notice = document.createElement('div');
              notice.id = 'posAutoLoadNotice';
              notice.className = 'hidden';
              notice.style.cssText = 'margin:14px 0;padding:15px 17px;border:1px solid #dfb542;border-left:7px solid #d8a528;border-radius:14px;background:#fff9e8;color:#4c3810;font:14px/1.5 system-ui';
              notice.innerHTML = '<strong style="display:block;font-size:16px;margin-bottom:4px">Loads adjusted automatically</strong><p style="margin:0"></p>';
              const anchor = $('#summaryCard') || $('#orderSummary') || $('#summaryTotal')?.closest('section,div');
              anchor?.parentNode?.insertBefore(notice, anchor);
            }
            if (!notice) return;
            if (calc.loads <= 1) { notice.classList.add('hidden'); notice.querySelector('p').textContent = ''; return; }
            const parts = loadDistribution(state.draft.quantity, calc.capacity, calc.unit);
            const message = `${quantityText(state.draft.quantity, calc.unit)} exceeds the ${quantityText(calc.capacity, calc.unit)} capacity of one ${calc.itemType.label.toLowerCase()} load. The order is set to ${calc.loads} loads (${parts.map(value => quantityText(value, calc.unit)).join(' + ')}). The selected service, products, temperature and add-ons apply to every load. Pricing and payment total were recalculated.`;
            notice.querySelector('p').textContent = message;
            notice.classList.remove('hidden');
          }
          """
          if 'function renderAutoLoadNotice' not in text:
              if capacity not in text: raise SystemExit('capacity block missing')
              text=text.replace(capacity,capacity+helper,1)
          old_summary="""  $('#summaryTotal').textContent=peso.format(calc.total);
          }
          """
          new_summary="""  $('#summaryTotal').textContent=peso.format(calc.total);
            renderAutoLoadNotice(calc);
          }
          """
          if 'renderAutoLoadNotice(calc);' not in text:
              if old_summary not in text: raise SystemExit('summary block missing')
              text=text.replace(old_summary,new_summary,1)
          old="""  $$('.quantity-box button').forEach(b=>b.addEventListener('click',()=>{const unit=currentLoadType().unit;const min=unit==='pc'?1:.5;state.draft.quantity=Math.max(min,Number(state.draft.quantity)+Number(b.dataset.qty));renderSummary();}));
          """
          new="""  $$('.quantity-box button').forEach(b=>b.addEventListener('click',()=>{const before=calculateDraft(),unit=currentLoadType().unit,min=unit==='pc'?1:.5;state.draft.quantity=Math.max(min,Number(state.draft.quantity)+Number(b.dataset.qty));const after=calculateDraft();renderSummary();if(after.loads>before.loads){const parts=loadDistribution(state.draft.quantity,after.capacity,after.unit);const message=`${quantityText(state.draft.quantity,after.unit)} exceeds the ${quantityText(after.capacity,after.unit)} capacity of one ${after.itemType.label.toLowerCase()} load. The order was changed from ${before.loads} to ${after.loads} loads (${parts.map(value=>quantityText(value,after.unit)).join(' + ')}). The same service, products, temperature and add-ons apply to every load. Pricing and payment total were recalculated.`;toast(message,9000);try{alert(message)}catch{}}}));
          """
          if 'const before=calculateDraft(),unit=currentLoadType().unit' not in text:
              if old not in text: raise SystemExit('quantity listener missing')
              text=text.replace(old,new,1)
          if 'automatic capacity-based load splitting' not in text: text=text.replace("'use strict';","'use strict';\n// Bubbly-fi Operations v2.6.13 — automatic capacity-based load splitting",1)
          path.write_text(text)
          PY
          node --check operations-android/app/src/main/assets/www/app-v2.6.12.js
          grep -q 'versionCode = 4' operations-android/app/build.gradle.kts
          grep -q 'renderAutoLoadNotice' operations-android/app/src/main/assets/www/app-v2.6.12.js
      - name: Commit source
        run: |
          rm -f .github/workflows/apply-operations-auto-load-201.yml .github/workflows/build-operations-auto-load-201.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add automatic capacity load calculation to Operations app'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
