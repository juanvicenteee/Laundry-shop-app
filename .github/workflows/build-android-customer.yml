name: Build Android customer app

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'customer-android/**'
      - '.github/workflows/build-android-customer.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle :app:assembleDebug :app:bundleRelease
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: customer-android-builds
          path: |
            customer-android/app/build/outputs/apk/debug/*.apk
            customer-android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
      - name: Record downloadable artifact
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-output
          cat > release-output/customer-android-latest.txt <<EOF
          run_id=${{ github.run_id }}
          artifact_id=${{ steps.upload.outputs.artifact-id }}
          artifact_name=customer-android-builds
          commit=${{ github.sha }}
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-output/customer-android-latest.txt
          git commit -m 'Record Customer Android build artifact [skip ci]'
          git push
