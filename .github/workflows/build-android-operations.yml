name: Build Android operations app

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'operations-android/**'
      - '.github/workflows/build-android-operations.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operations-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle :app:assembleDebug :app:bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: operations-android-builds
          path: |
            operations-android/app/build/outputs/apk/debug/*.apk
            operations-android/app/build/outputs/bundle/release/*.aab
