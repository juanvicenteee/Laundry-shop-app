name: Build Operations Native AAB

on:
  push:
    branches: [build/operations-2.0.1-signed-aab]
  pull_request:
    branches: [main]

jobs:
  bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operations-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Verify release identity
        run: |
          grep -F 'applicationId = "ph.bubblyfi.operations"' app/build.gradle.kts
          grep -F 'versionCode = 4' app/build.gradle.kts
          grep -F 'versionName = "2.0.1"' app/build.gradle.kts
      - name: Clean native Gradle bundle
        run: gradle --no-daemon clean bundleRelease
      - name: Upload unsigned release bundle
        uses: actions/upload-artifact@v4
        with:
          name: operations-2.0.1-native-aab
          path: operations-android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
