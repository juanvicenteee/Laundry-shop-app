name: Customer Notification Self Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend-updates/supabase/functions/customer-notification-self-test/**'
      - 'backend-updates/supabase/functions/_shared/common.ts'
      - '.github/workflows/deploy-customer-notification-self-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend-updates/supabase/functions/customer-notification-self-test/**'
      - 'backend-updates/supabase/functions/_shared/common.ts'
      - '.github/workflows/deploy-customer-notification-self-test.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check --node-modules-dir=auto backend-updates/supabase/functions/customer-notification-self-test/index.ts

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy device-bound notification test
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          supabase functions deploy customer-notification-self-test --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates
      - name: Verify endpoint validation
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            code=$(curl --silent --output /tmp/result.json --write-out '%{http_code}' \
              --request POST --header 'Content-Type: application/json' --data '{}' \
              "https://${PROJECT_REF}.supabase.co/functions/v1/customer-notification-self-test")
            [ "$code" = 400 ] && break
            sleep 3
          done
          test "$code" = 400
          grep -q 'device token' /tmp/result.json
