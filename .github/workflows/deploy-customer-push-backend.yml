name: Customer Push Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-customer-push-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend-updates/migrate-mobile-app-v11-guest-push-history.sql'
      - 'backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql'
      - 'backend-updates/supabase/functions/send-marketing-push/**'
      - 'backend-updates/supabase/functions/push-order-status/**'
      - 'backend-updates/supabase/functions/send-push-notification/**'
      - 'backend-updates/supabase/functions/_shared/**'
      - 'backend-updates/supabase/config.toml'
      - '.github/workflows/deploy-customer-push-backend.yml'

permissions:
  contents: write

concurrency:
  group: customer-push-live-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check automatic status sender
        run: deno check --node-modules-dir=auto backend-updates/supabase/functions/send-push-notification/index.ts
      - name: Check POS marketing sender
        run: deno check --node-modules-dir=auto backend-updates/supabase/functions/send-marketing-push/index.ts
      - name: Check staff status sender
        run: deno check --node-modules-dir=auto backend-updates/supabase/functions/push-order-status/index.ts
      - name: Check migration files
        run: |
          test -s backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          test -s backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql
          grep -q 'register_customer_installation' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'get_customer_tracking' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'notify_rider_approaching' backend-updates/migrate-mobile-app-v11-guest-push-history.sql

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Verify deployment credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then echo '::error::Missing repository secret SUPABASE_ACCESS_TOKEN'; exit 1; fi
          if [ -z "${SUPABASE_DB_URL:-}" ]; then echo '::error::Missing repository secret SUPABASE_DB_URL'; exit 1; fi
      - name: Apply guest push and history migrations
        shell: bash
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql
      - name: Deploy automatic status sender
        run: supabase functions deploy send-push-notification --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates
      - name: Deploy POS marketing sender
        run: supabase functions deploy send-marketing-push --project-ref "$PROJECT_REF" --workdir backend-updates
      - name: Deploy staff status sender
        run: supabase functions deploy push-order-status --project-ref "$PROJECT_REF" --workdir backend-updates

  record-result:
    if: always() && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Record safe deployment result
        env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p backend-updates/deployment-status
          {
            echo "customer_push_backend"
            echo "validate=$VALIDATE_RESULT"
            echo "deploy=$DEPLOY_RESULT"
            echo "source_sha=$SOURCE_SHA"
            echo "recorded_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > backend-updates/deployment-status/customer-push-live.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend-updates/deployment-status/customer-push-live.txt
          git commit -m 'Record customer push backend deployment result' || exit 0
          git push origin HEAD:main
