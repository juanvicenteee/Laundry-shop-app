name: Customer Push Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-customer-push-backend.yml'
      - 'backend-updates/supabase/functions/_shared/common.ts'
      - 'backend-updates/supabase/functions/customer-push-smoke/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend-updates/migrate-mobile-app-v11-guest-push-history.sql'
      - 'backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql'
      - 'backend-updates/migrate-mobile-app-v12-null-request-id-registration.sql'
      - 'backend-updates/supabase/functions/send-marketing-push/**'
      - 'backend-updates/supabase/functions/push-order-status/**'
      - 'backend-updates/supabase/functions/send-push-notification/**'
      - 'backend-updates/supabase/functions/customer-push-smoke/**'
      - 'backend-updates/supabase/functions/_shared/**'
      - 'backend-updates/supabase/config.toml'
      - '.github/workflows/deploy-customer-push-backend.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check push senders
        run: |
          set -euo pipefail
          deno check --node-modules-dir=auto backend-updates/supabase/functions/send-push-notification/index.ts
          deno check --node-modules-dir=auto backend-updates/supabase/functions/send-marketing-push/index.ts
          deno check --node-modules-dir=auto backend-updates/supabase/functions/push-order-status/index.ts
          deno check --node-modules-dir=auto backend-updates/supabase/functions/customer-push-smoke/index.ts
      - name: Verify Firebase OAuth grant and broadcast recipients
        run: |
          set -euo pipefail
          grep -Fq "grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer'" backend-updates/supabase/functions/_shared/common.ts
          ! grep -Fq "urn:ietf:params:oauth-grant-type:jwt-bearer" backend-updates/supabase/functions/_shared/common.ts
          grep -q "customer_installations" backend-updates/supabase/functions/send-marketing-push/index.ts
          grep -q "customer_device_tokens" backend-updates/supabase/functions/send-marketing-push/index.ts
          grep -q "marketing_broadcast" backend-updates/supabase/functions/send-marketing-push/index.ts
      - name: Check migration files
        run: |
          set -euo pipefail
          test -s backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          test -s backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql
          test -s backend-updates/migrate-mobile-app-v12-null-request-id-registration.sql
          grep -q 'register_customer_installation' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'get_customer_tracking' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'notify_rider_approaching' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'p_request_id is null or request.id = p_request_id' backend-updates/migrate-mobile-app-v12-null-request-id-registration.sql

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deployment credentials
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${SUPABASE_DB_URL:-}"

      - name: Deploy production push functions
        run: |
          set -euo pipefail
          supabase functions deploy send-push-notification --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates
          supabase functions deploy send-marketing-push --project-ref "$PROJECT_REF" --workdir backend-updates
          supabase functions deploy push-order-status --project-ref "$PROJECT_REF" --workdir backend-updates

      - name: Deploy temporary FCM smoke test
        run: |
          set -euo pipefail
          supabase functions deploy customer-push-smoke --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates

      - name: Send real Customer FCM smoke notification
        id: smoke
        shell: bash
        run: |
          set -euo pipefail
          response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{}' \
            "https://${PROJECT_REF}.supabase.co/functions/v1/customer-push-smoke")
          printf '%s\n' "$response" | tee /tmp/customer-push-smoke.json
          python3 - <<'PY'
          import json
          payload=json.load(open('/tmp/customer-push-smoke.json',encoding='utf-8'))
          if payload.get('ok') is not True or int(payload.get('delivered') or 0) != 1 or int(payload.get('fcm_status') or 0) != 200:
              raise SystemExit('Live Customer FCM smoke test failed: '+json.dumps(payload,sort_keys=True))
          print('Live Customer FCM smoke test passed.')
          PY
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          p=json.load(open('/tmp/customer-push-smoke.json',encoding='utf-8'))
          print('source='+str(p.get('source','unknown')))
          print('fcm_status='+str(p.get('fcm_status','')))
          print('attempted_tokens='+str(p.get('attempted_tokens','')))
          print('candidate_count='+str(p.get('candidate_count','')))
          PY

      - name: Remove temporary smoke function
        if: always()
        shell: bash
        run: |
          set +e
          printf 'y\n' | supabase functions delete customer-push-smoke --project-ref "$PROJECT_REF"
          exit 0

      - name: Verify live production functions
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$PROJECT_REF" --output json > /tmp/functions.json
          python3 - <<'PY'
          import json
          payload=json.load(open('/tmp/functions.json',encoding='utf-8'))
          rows=payload.get('functions',[]) if isinstance(payload,dict) else payload
          names={str(row.get('name') or row.get('slug')) for row in rows}
          required={'send-push-notification','send-marketing-push','push-order-status'}
          missing=required-names
          if missing: raise SystemExit('Missing deployed functions: '+', '.join(sorted(missing)))
          if 'customer-push-smoke' in names: raise SystemExit('Temporary smoke function was not removed')
          print('Live production push functions verified.')
          PY

      - name: Record verified broadcast deployment
        if: success() && github.event_name == 'push'
        run: |
          set -euo pipefail
          mkdir -p backend-updates/deployment-status
          cat > backend-updates/deployment-status/customer-broadcast-oauth-fix-live.txt <<EOF
          customer_broadcast_oauth_fix
          oauth_grant_type=success
          push_function_deploy=success
          real_fcm_smoke=success
          fcm_http_status=${{ steps.smoke.outputs.fcm_status }}
          token_source=${{ steps.smoke.outputs.source }}
          attempted_tokens=${{ steps.smoke.outputs.attempted_tokens }}
          candidate_count=${{ steps.smoke.outputs.candidate_count }}
          temporary_smoke_function_removed=success
          source_sha=${GITHUB_SHA}
          recorded_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend-updates/deployment-status/customer-broadcast-oauth-fix-live.txt
          git commit -m 'Record verified Customer broadcast FCM deployment'
          git push
