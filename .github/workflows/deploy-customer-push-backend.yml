name: Customer Push Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-customer-push-backend.yml'
      - 'backend-updates/supabase/functions/_shared/common.ts'
      - 'backend-updates/supabase/functions/customer-push-smoke/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend-updates/migrate-mobile-app-v11-guest-push-history.sql'
      - 'backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql'
      - 'backend-updates/migrate-mobile-app-v12-null-request-id-registration.sql'
      - 'backend-updates/supabase/functions/send-marketing-push/**'
      - 'backend-updates/supabase/functions/push-order-status/**'
      - 'backend-updates/supabase/functions/send-push-notification/**'
      - 'backend-updates/supabase/functions/customer-push-smoke/**'
      - 'backend-updates/supabase/functions/_shared/**'
      - 'backend-updates/supabase/config.toml'
      - '.github/workflows/deploy-customer-push-backend.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check push senders
        run: |
          set -euo pipefail
          deno check --node-modules-dir=auto backend-updates/supabase/functions/send-push-notification/index.ts
          deno check --node-modules-dir=auto backend-updates/supabase/functions/send-marketing-push/index.ts
          deno check --node-modules-dir=auto backend-updates/supabase/functions/push-order-status/index.ts
          deno check --node-modules-dir=auto backend-updates/supabase/functions/customer-push-smoke/index.ts
      - name: Verify Firebase OAuth grant and broadcast recipients
        run: |
          set -euo pipefail
          grep -Fq "grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer'" backend-updates/supabase/functions/_shared/common.ts
          ! grep -Fq "urn:ietf:params:oauth-grant-type:jwt-bearer" backend-updates/supabase/functions/_shared/common.ts
          grep -q "customer_installations" backend-updates/supabase/functions/send-marketing-push/index.ts
          grep -q "customer_device_tokens" backend-updates/supabase/functions/send-marketing-push/index.ts
          grep -q "marketing_broadcast" backend-updates/supabase/functions/send-marketing-push/index.ts

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify deployment credentials
        id: credentials
        continue-on-error: true
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"

      - name: Deploy production push functions
        id: production_deploy
        continue-on-error: true
        run: |
          set -euo pipefail
          supabase functions deploy send-push-notification --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates
          supabase functions deploy send-marketing-push --project-ref "$PROJECT_REF" --workdir backend-updates
          supabase functions deploy push-order-status --project-ref "$PROJECT_REF" --workdir backend-updates

      - name: Deploy temporary FCM smoke test
        id: smoke_deploy
        continue-on-error: true
        run: |
          set -euo pipefail
          supabase functions deploy customer-push-smoke --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates

      - name: Send real Customer FCM smoke notification
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set +e
          : > /tmp/customer-push-smoke.json
          http_code=000
          curl_exit=1
          for attempt in 1 2 3 4 5 6; do
            http_code=$(curl --silent --show-error \
              --output /tmp/customer-push-smoke.json \
              --write-out '%{http_code}' \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{}' \
              "https://${PROJECT_REF}.supabase.co/functions/v1/customer-push-smoke")
            curl_exit=$?
            if [ "$curl_exit" -eq 0 ] && [ "$http_code" != "404" ] && [ "$http_code" != "503" ] && [ "$http_code" != "000" ]; then
              break
            fi
            sleep 4
          done
          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "curl_exit=$curl_exit" >> "$GITHUB_OUTPUT"
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib
          p=pathlib.Path('/tmp/customer-push-smoke.json')
          try:
              payload=json.loads(p.read_text(encoding='utf-8') or '{}')
          except Exception as exc:
              payload={'ok':False,'error':'Invalid smoke response: '+str(exc)}
          print('ok='+str(payload.get('ok') is True).lower())
          print('delivered='+str(payload.get('delivered','')))
          print('source='+str(payload.get('source','unknown')))
          print('fcm_status='+str(payload.get('fcm_status','')))
          print('attempted_tokens='+str(payload.get('attempted_tokens','')))
          print('candidate_count='+str(payload.get('candidate_count','')))
          summary={k:payload.get(k) for k in ('ok','error','delivered','source','token','fcm_status','attempted_tokens','candidate_count','attempts') if k in payload}
          pathlib.Path('/tmp/customer-push-smoke-summary.json').write_text(json.dumps(summary,separators=(',',':'),ensure_ascii=True),encoding='utf-8')
          PY
          cat /tmp/customer-push-smoke-summary.json
          exit 0

      - name: Remove temporary smoke function
        id: cleanup
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          printf 'y\n' | supabase functions delete customer-push-smoke --project-ref "$PROJECT_REF"
          exit 0

      - name: Verify live production functions
        id: verify
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          supabase functions list --project-ref "$PROJECT_REF" --output json > /tmp/functions.json
          python3 - <<'PY'
          import json
          payload=json.load(open('/tmp/functions.json',encoding='utf-8'))
          rows=payload.get('functions',[]) if isinstance(payload,dict) else payload
          names={str(row.get('name') or row.get('slug')) for row in rows}
          required={'send-push-notification','send-marketing-push','push-order-status'}
          missing=required-names
          if missing: raise SystemExit('Missing deployed functions: '+', '.join(sorted(missing)))
          if 'customer-push-smoke' in names: raise SystemExit('Temporary smoke function was not removed')
          print('Live production push functions verified.')
          PY

      - name: Record broadcast deployment diagnostics
        id: diagnostics
        if: always() && github.event_name == 'push'
        env:
          CREDENTIALS_OUTCOME: ${{ steps.credentials.outcome }}
          PRODUCTION_DEPLOY_OUTCOME: ${{ steps.production_deploy.outcome }}
          SMOKE_DEPLOY_OUTCOME: ${{ steps.smoke_deploy.outcome }}
          SMOKE_STEP_OUTCOME: ${{ steps.smoke.outcome }}
          SMOKE_OK: ${{ steps.smoke.outputs.ok }}
          SMOKE_HTTP_CODE: ${{ steps.smoke.outputs.http_code }}
          SMOKE_CURL_EXIT: ${{ steps.smoke.outputs.curl_exit }}
          SMOKE_FCM_STATUS: ${{ steps.smoke.outputs.fcm_status }}
          SMOKE_SOURCE: ${{ steps.smoke.outputs.source }}
          SMOKE_ATTEMPTED: ${{ steps.smoke.outputs.attempted_tokens }}
          SMOKE_CANDIDATES: ${{ steps.smoke.outputs.candidate_count }}
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          mkdir -p backend-updates/deployment-status
          smoke_summary=$(cat /tmp/customer-push-smoke-summary.json 2>/dev/null || printf '{"ok":false,"error":"Smoke request did not produce a response"}')
          overall=failure
          if [ "$CREDENTIALS_OUTCOME" = success ] && \
             [ "$PRODUCTION_DEPLOY_OUTCOME" = success ] && \
             [ "$SMOKE_DEPLOY_OUTCOME" = success ] && \
             [ "$SMOKE_OK" = true ] && \
             [ "$SMOKE_HTTP_CODE" = 200 ] && \
             [ "$SMOKE_FCM_STATUS" = 200 ] && \
             [ "$VERIFY_OUTCOME" = success ]; then
            overall=success
          fi
          cat > backend-updates/deployment-status/customer-broadcast-oauth-fix-live.txt <<EOF
          customer_broadcast_oauth_fix
          overall=$overall
          credentials=$CREDENTIALS_OUTCOME
          production_function_deploy=$PRODUCTION_DEPLOY_OUTCOME
          smoke_function_deploy=$SMOKE_DEPLOY_OUTCOME
          smoke_step=$SMOKE_STEP_OUTCOME
          smoke_ok=$SMOKE_OK
          smoke_http_code=$SMOKE_HTTP_CODE
          smoke_curl_exit=$SMOKE_CURL_EXIT
          fcm_http_status=$SMOKE_FCM_STATUS
          token_source=$SMOKE_SOURCE
          attempted_tokens=$SMOKE_ATTEMPTED
          candidate_count=$SMOKE_CANDIDATES
          cleanup_step=$CLEANUP_OUTCOME
          production_function_verification=$VERIFY_OUTCOME
          smoke_response=$smoke_summary
          source_sha=${GITHUB_SHA}
          recorded_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend-updates/deployment-status/customer-broadcast-oauth-fix-live.txt
          git commit -m "Record Customer broadcast deployment diagnostics ($overall)"
          git push

      - name: Enforce successful live FCM verification
        if: always()
        env:
          CREDENTIALS_OUTCOME: ${{ steps.credentials.outcome }}
          PRODUCTION_DEPLOY_OUTCOME: ${{ steps.production_deploy.outcome }}
          SMOKE_DEPLOY_OUTCOME: ${{ steps.smoke_deploy.outcome }}
          SMOKE_OK: ${{ steps.smoke.outputs.ok }}
          SMOKE_HTTP_CODE: ${{ steps.smoke.outputs.http_code }}
          SMOKE_FCM_STATUS: ${{ steps.smoke.outputs.fcm_status }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          test "$CREDENTIALS_OUTCOME" = success
          test "$PRODUCTION_DEPLOY_OUTCOME" = success
          test "$SMOKE_DEPLOY_OUTCOME" = success
          test "$SMOKE_OK" = true
          test "$SMOKE_HTTP_CODE" = 200
          test "$SMOKE_FCM_STATUS" = 200
          test "$VERIFY_OUTCOME" = success
