name: Customer Push Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-customer-push-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend-updates/migrate-mobile-app-v11-guest-push-history.sql'
      - 'backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql'
      - 'backend-updates/supabase/functions/send-marketing-push/**'
      - 'backend-updates/supabase/functions/push-order-status/**'
      - 'backend-updates/supabase/functions/send-push-notification/**'
      - 'backend-updates/supabase/functions/_shared/**'
      - 'backend-updates/supabase/config.toml'
      - '.github/workflows/deploy-customer-push-backend.yml'

permissions:
  contents: write

concurrency:
  group: customer-push-live-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check automatic status sender
        run: deno check --node-modules-dir=auto backend-updates/supabase/functions/send-push-notification/index.ts
      - name: Check POS marketing sender
        run: deno check --node-modules-dir=auto backend-updates/supabase/functions/send-marketing-push/index.ts
      - name: Check staff status sender
        run: deno check --node-modules-dir=auto backend-updates/supabase/functions/push-order-status/index.ts
      - name: Check migration files
        run: |
          test -s backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          test -s backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql
          grep -q 'register_customer_installation' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'get_customer_tracking' backend-updates/migrate-mobile-app-v11-guest-push-history.sql
          grep -q 'notify_rider_approaching' backend-updates/migrate-mobile-app-v11-guest-push-history.sql

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4

      - id: setup_cli
        name: Set up Supabase CLI
        continue-on-error: true
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - id: credentials
        name: Verify deployment credentials
        if: steps.setup_cli.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then echo '::error::Missing repository secret SUPABASE_ACCESS_TOKEN'; exit 1; fi
          if [ -z "${SUPABASE_DB_URL:-}" ]; then echo '::error::Missing repository secret SUPABASE_DB_URL'; exit 1; fi

      - id: pooler
        name: Discover authenticated IPv4 Supavisor session pooler
        if: steps.credentials.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          supabase projects list --output json > /tmp/supabase-projects.json
          python3 - <<'PY'
          import json, os, subprocess
          from urllib.parse import quote, unquote, urlsplit

          project_ref = os.environ['PROJECT_REF']
          payload = json.load(open('/tmp/supabase-projects.json', encoding='utf-8'))
          projects = payload.get('projects', []) if isinstance(payload, dict) else payload
          project = next((row for row in projects if str(row.get('id') or row.get('ref')) == project_ref), None)
          if not project:
              raise SystemExit('Supabase project was not found for the configured access token')
          region = str(project.get('region') or '').strip()
          if not region:
              raise SystemExit('Supabase project region was not returned')

          direct = urlsplit(os.environ['SUPABASE_DB_URL'])
          if not direct.password:
              raise SystemExit('Database password is missing from SUPABASE_DB_URL')
          username = quote(f'postgres.{project_ref}', safe='')
          password = quote(unquote(direct.password), safe='')

          selected = None
          selected_cluster = None
          failures = []
          for cluster in range(10):
              host = f'aws-{cluster}-{region}.pooler.supabase.com'
              candidate = f'postgresql://{username}:{password}@{host}:5432/postgres?sslmode=require'
              print(f'::add-mask::{candidate}')
              try:
                  probe = subprocess.run(
                      ['psql', candidate, '-v', 'ON_ERROR_STOP=1', '-Atqc', 'select 1'],
                      capture_output=True, text=True, timeout=20
                  )
              except subprocess.TimeoutExpired:
                  failures.append(f'{host}: timeout')
                  continue
              if probe.returncode == 0 and probe.stdout.strip() == '1':
                  selected = candidate
                  selected_cluster = cluster
                  break
              error_line = (probe.stderr or probe.stdout).strip().splitlines()
              failures.append(f'{host}: {error_line[-1] if error_line else "connection failed"}')

          if not selected:
              print('No authenticated Supavisor session endpoint was found:')
              for failure in failures:
                  print(f'- {failure}')
              raise SystemExit(1)

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env_file:
              env_file.write(f'POOLER_DB_URL={selected}\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output_file:
              output_file.write(f'region={region}\n')
              output_file.write(f'cluster=aws-{selected_cluster}\n')
          print(f'Using authenticated IPv4 Supavisor session pooler aws-{selected_cluster} in region {region}.')
          PY

      - id: migration_v11
        name: Apply guest push and history migration
        if: steps.pooler.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          psql "$POOLER_DB_URL" -v ON_ERROR_STOP=1 -f backend-updates/migrate-mobile-app-v11-guest-push-history.sql > /tmp/migration-v11.log 2>&1
          code=$?
          cat /tmp/migration-v11.log
          exit "$code"

      - id: migration_v11b
        name: Correct history trigger ordering
        if: steps.migration_v11.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          psql "$POOLER_DB_URL" -v ON_ERROR_STOP=1 -f backend-updates/migrate-mobile-app-v11b-history-trigger-order.sql > /tmp/migration-v11b.log 2>&1
          code=$?
          cat /tmp/migration-v11b.log
          exit "$code"

      - id: automatic_sender
        name: Deploy automatic status sender
        if: steps.migration_v11b.outcome == 'success'
        continue-on-error: true
        run: supabase functions deploy send-push-notification --project-ref "$PROJECT_REF" --no-verify-jwt --workdir backend-updates

      - id: marketing_sender
        name: Deploy POS marketing sender
        if: steps.automatic_sender.outcome == 'success'
        continue-on-error: true
        run: supabase functions deploy send-marketing-push --project-ref "$PROJECT_REF" --workdir backend-updates

      - id: staff_sender
        name: Deploy staff status sender
        if: steps.marketing_sender.outcome == 'success'
        continue-on-error: true
        run: supabase functions deploy push-order-status --project-ref "$PROJECT_REF" --workdir backend-updates

      - name: Record safe deployment diagnostics
        if: always()
        env:
          SETUP_RESULT: ${{ steps.setup_cli.outcome }}
          CREDENTIALS_RESULT: ${{ steps.credentials.outcome }}
          POOLER_RESULT: ${{ steps.pooler.outcome }}
          POOLER_REGION: ${{ steps.pooler.outputs.region }}
          POOLER_CLUSTER: ${{ steps.pooler.outputs.cluster }}
          MIGRATION_V11_RESULT: ${{ steps.migration_v11.outcome }}
          MIGRATION_V11B_RESULT: ${{ steps.migration_v11b.outcome }}
          AUTOMATIC_RESULT: ${{ steps.automatic_sender.outcome }}
          MARKETING_RESULT: ${{ steps.marketing_sender.outcome }}
          STAFF_RESULT: ${{ steps.staff_sender.outcome }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p backend-updates/deployment-status
          {
            echo "customer_push_backend"
            echo "validate=success"
            echo "setup_cli=$SETUP_RESULT"
            echo "credentials=$CREDENTIALS_RESULT"
            echo "pooler=$POOLER_RESULT"
            echo "pooler_region=${POOLER_REGION:-unknown}"
            echo "pooler_cluster=${POOLER_CLUSTER:-unknown}"
            echo "migration_v11=$MIGRATION_V11_RESULT"
            echo "migration_v11b=$MIGRATION_V11B_RESULT"
            echo "automatic_sender=$AUTOMATIC_RESULT"
            echo "marketing_sender=$MARKETING_RESULT"
            echo "staff_sender=$STAFF_RESULT"
            echo "source_sha=$SOURCE_SHA"
            echo "recorded_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > backend-updates/deployment-status/customer-push-live.txt

          python3 - <<'PY'
          import os, re
          parts = []
          for label, path in [('migration_v11', '/tmp/migration-v11.log'), ('migration_v11b', '/tmp/migration-v11b.log')]:
              if not os.path.exists(path):
                  continue
              text = open(path, encoding='utf-8', errors='replace').read()
              for secret_name in ('SUPABASE_DB_URL', 'POOLER_DB_URL'):
                  secret = os.environ.get(secret_name, '')
                  if secret:
                      text = text.replace(secret, '[REDACTED_DB_URL]')
              text = re.sub(r'postgres(?:ql)?://\S+', '[REDACTED_DB_URL]', text, flags=re.I)
              text = re.sub(r'password=\S+', 'password=[REDACTED]', text, flags=re.I)
              parts.append(f'[{label}]\n' + '\n'.join(text.splitlines()[-100:]))
          target = 'backend-updates/deployment-status/customer-push-migration-diagnostic.txt'
          if parts:
              open(target, 'w', encoding='utf-8').write('\n\n'.join(parts) + '\n')
          elif os.path.exists(target):
              os.remove(target)
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A backend-updates/deployment-status
          git commit -m 'Record customer push deployment diagnostics' || true
          git push origin HEAD:main

      - name: Fail when any deployment stage failed
        if: always()
        env:
          SETUP_RESULT: ${{ steps.setup_cli.outcome }}
          CREDENTIALS_RESULT: ${{ steps.credentials.outcome }}
          POOLER_RESULT: ${{ steps.pooler.outcome }}
          MIGRATION_V11_RESULT: ${{ steps.migration_v11.outcome }}
          MIGRATION_V11B_RESULT: ${{ steps.migration_v11b.outcome }}
          AUTOMATIC_RESULT: ${{ steps.automatic_sender.outcome }}
          MARKETING_RESULT: ${{ steps.marketing_sender.outcome }}
          STAFF_RESULT: ${{ steps.staff_sender.outcome }}
        run: |
          set -euo pipefail
          for result in "$SETUP_RESULT" "$CREDENTIALS_RESULT" "$POOLER_RESULT" "$MIGRATION_V11_RESULT" "$MIGRATION_V11B_RESULT" "$AUTOMATIC_RESULT" "$MARKETING_RESULT" "$STAFF_RESULT"; do
            [ "$result" = "success" ] || exit 1
          done
