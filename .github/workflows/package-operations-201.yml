name: Diagnose Operations 2.0.1 Build

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/package-operations-201.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build release and preserve diagnostics
        shell: bash
        run: |
          mkdir -p build-diagnostics
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/' operations-android/app/build.gradle.kts
          sed -i 's/isShrinkResources = true/isShrinkResources = false/' operations-android/app/build.gradle.kts
          cd operations-android
          chmod +x gradlew
          set +e
          ./gradlew :app:clean :app:assembleRelease :app:bundleRelease --stacktrace > ../build-diagnostics/full.log 2>&1
          status=$?
          cd ..
          printf '%s\n' "$status" > build-diagnostics/exit-code.txt
          tail -n 240 build-diagnostics/full.log > build-diagnostics/log-tail.txt
          find operations-android/app/build/outputs -maxdepth 8 -type f -print 2>/dev/null | sort > build-diagnostics/output-files.txt || true
          rm -f build-diagnostics/full.log
          git checkout -- operations-android/app/build.gradle.kts
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build-diagnostics
          git commit -m 'Record Operations 2.0.1 Gradle diagnostics'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
          exit 0
