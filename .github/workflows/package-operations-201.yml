name: Diagnose Operations 2.0.1 Build

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/package-operations-201.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and comment diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/' operations-android/app/build.gradle.kts
          sed -i 's/isShrinkResources = true/isShrinkResources = false/' operations-android/app/build.gradle.kts
          cd operations-android
          chmod +x gradlew
          set +e
          ./gradlew :app:clean :app:assembleRelease :app:bundleRelease --stacktrace > /tmp/operations-gradle.log 2>&1
          status=$?
          cd ..
          outputs=$(find operations-android/app/build/outputs -maxdepth 8 -type f -print 2>/dev/null | sort | tail -n 40)
          {
            echo '### Operations 2.0.1 Gradle diagnostics'
            echo
            echo "Exit code: \`$status\`"
            echo
            echo '**Generated outputs**'
            echo '```text'
            printf '%s\n' "$outputs"
            echo '```'
            echo
            echo '**Gradle log tail**'
            echo '```text'
            tail -n 180 /tmp/operations-gradle.log
            echo '```'
          } > /tmp/operations-comment.md
          gh pr comment '${{ github.event.pull_request.number }}' --body-file /tmp/operations-comment.md
          exit 0
