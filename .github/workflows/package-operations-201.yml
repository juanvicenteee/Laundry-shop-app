name: Package Operations 2.0.1

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/package-operations-201.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build and collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/' operations-android/app/build.gradle.kts
          sed -i 's/isShrinkResources = true/isShrinkResources = false/' operations-android/app/build.gradle.kts
          cd operations-android
          chmod +x gradlew
          ./gradlew :app:clean :app:assembleRelease :app:bundleRelease --stacktrace 2>&1 | tee ../release/gradle-build.log
          find app/build/outputs -maxdepth 8 -type f -print | sort | tee ../release/output-files.txt
          find app/build/outputs/apk -type f -name '*.apk' -exec cp {} ../release/ \;
          find app/build/outputs/bundle -type f -name '*.aab' -exec cp {} ../release/ \;
          cd ..
          test "$(find release -maxdepth 1 -type f -name '*.apk' | wc -l)" -ge 1
          test "$(find release -maxdepth 1 -type f -name '*.aab' | wc -l)" -ge 1
          sha256sum release/*.apk release/*.aab > release/SHA256SUMS.txt
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: bubblyfi-operations-2.0.1-binaries
          path: release/*
          retention-days: 7
          if-no-files-found: error
      - name: Record downloadable artifact ID
        shell: bash
        run: |
          printf '%s\n' '${{ steps.upload.outputs.artifact-id }}' > release-artifact-id-operations.txt
          printf '%s\n' '${{ github.run_id }}' > release-run-id-operations.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release-artifact-id-operations.txt release-run-id-operations.txt
          git commit -m 'Record Operations 2.0.1 release artifact ID'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
