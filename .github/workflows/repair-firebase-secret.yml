name: Repair Firebase Secret

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend-updates/trigger-firebase-secret-repair.txt'

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Firebase JSON
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}"
          python3 - <<'PY'
          import json, os
          p=json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT_JSON'])
          assert p.get('type') == 'service_account'
          assert p.get('project_id') == 'bubbly-fi'
          assert p.get('client_email')
          assert 'BEGIN PRIVATE KEY' in str(p.get('private_key') or '')
          print('Firebase JSON validated.')
          PY

      - name: Set production secret
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            FIREBASE_SERVICE_ACCOUNT_JSON="$FIREBASE_SERVICE_ACCOUNT_JSON" \
            --project-ref "$PROJECT_REF"
          supabase secrets list --project-ref "$PROJECT_REF"
