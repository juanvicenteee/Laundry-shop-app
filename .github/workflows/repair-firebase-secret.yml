name: Repair Firebase Secret

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend-updates/trigger-firebase-secret-repair.txt'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Firebase JSON
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}"
          python3 - <<'PY'
          import json, os
          p=json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT_JSON'])
          assert p.get('type') == 'service_account'
          assert p.get('project_id') == 'bubbly-fi'
          assert p.get('client_email')
          assert 'BEGIN PRIVATE KEY' in str(p.get('private_key') or '')
          print('Firebase JSON validated.')
          PY

      - name: Set production secret
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            FIREBASE_SERVICE_ACCOUNT_JSON="$FIREBASE_SERVICE_ACCOUNT_JSON" \
            --project-ref "$PROJECT_REF"
          supabase secrets list --project-ref "$PROJECT_REF"

      - name: Record successful repair
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend-updates/deployment-status
          cat > backend-updates/deployment-status/firebase-secret-repair-live.txt <<EOF
          firebase_secret_repair
          overall=success
          firebase_json_validation=success
          supabase_secret_update=success
          project_ref=${PROJECT_REF}
          source_sha=${GITHUB_SHA}
          recorded_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend-updates/deployment-status/firebase-secret-repair-live.txt
          git commit -m 'Record successful Firebase secret repair'
          git push
