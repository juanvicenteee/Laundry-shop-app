name: Repair Firebase Secret

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend-updates/trigger-firebase-secret-repair.txt'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      PROJECT_REF: amjhrejmcnthlrqddznw
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate and normalize Firebase JSON
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}"
          python3 - <<'PY'
          import base64, json, os
          p=json.loads(os.environ['FIREBASE_SERVICE_ACCOUNT_JSON'])
          assert p.get('type') == 'service_account'
          assert p.get('project_id') == 'bubbly-fi'
          assert p.get('client_email')
          key=str(p.get('private_key') or '').replace('\\n','\n').strip()
          assert key.startswith('-----BEGIN PRIVATE KEY-----')
          assert key.endswith('-----END PRIVATE KEY-----')
          body=''.join(line.strip() for line in key.splitlines() if not line.startswith('-----'))
          base64.b64decode(body, validate=True)
          p['private_key']=key+'\n'
          value=json.dumps(p,separators=(',',':'))
          with open('/tmp/firebase-secret.env','w',encoding='utf-8',newline='\n') as f:
              f.write('FIREBASE_SERVICE_ACCOUNT_JSON='+value+'\n')
          print('Firebase JSON and PKCS#8 key validated.')
          PY

      - name: Set production secret from environment file
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            --env-file /tmp/firebase-secret.env \
            --project-ref "$PROJECT_REF"
          rm -f /tmp/firebase-secret.env
          supabase secrets list --project-ref "$PROJECT_REF"

      - name: Record successful repair
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend-updates/deployment-status
          cat > backend-updates/deployment-status/firebase-secret-repair-live.txt <<EOF
          firebase_secret_repair
          overall=success
          firebase_json_validation=success
          pkcs8_validation=success
          supabase_env_file_update=success
          project_ref=${PROJECT_REF}
          source_sha=${GITHUB_SHA}
          recorded_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend-updates/deployment-status/firebase-secret-repair-live.txt
          git commit -m 'Record successful normalized Firebase secret repair'
          git push
