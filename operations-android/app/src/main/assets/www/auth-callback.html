<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d83a3">
  <title>Completing Bubbly-fi sign-in</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef8fa;color:#173f48;font:16px/1.5 system-ui;padding:24px;box-sizing:border-box}
    main{max-width:520px;background:#fff;border:1px solid #cfe3e7;border-radius:22px;padding:28px;text-align:center;box-shadow:0 12px 35px rgba(7,72,84,.12)}
    h1{margin:0 0 10px;color:#075f70}p{margin:8px 0}.btn{display:inline-block;margin-top:16px;border:0;border-radius:12px;background:#087286;color:#fff;padding:13px 18px;font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <h1>Completing sign-in…</h1>
    <p id="message">Returning you to Bubbly-fi.</p>
    <a id="fallback" class="btn" href="/customer">Return to Bubbly-fi</a>
  </main>
  <script>
    (() => {
      const query = new URLSearchParams(location.search);
      const target = query.get('target') || 'web';
      const suffix = location.hash || location.search.replace(/^[?]/, '#');
      const message = document.getElementById('message');
      const fallback = document.getElementById('fallback');

      if (target === 'android') {
        const appUrl = `ph.bubblyfi.customer://auth-callback${location.hash || ''}`;
        fallback.href = appUrl;
        fallback.textContent = 'Open Bubbly-fi Customer';
        message.textContent = 'Opening the Bubbly-fi Customer app…';
        location.replace(appUrl);
        setTimeout(() => { message.textContent = 'Tap the button below if the app did not open automatically.'; }, 1500);
        return;
      }

      const webUrl = `/customer${location.hash || ''}`;
      fallback.href = webUrl;
      location.replace(webUrl);
    })();
  </script>
</body>
</html>
